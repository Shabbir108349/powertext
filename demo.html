<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Text Expander Pro — Light</title>
  <style>
    :root {
      --bg: #f8fafc;
      --card: #ffffff;
      --surface: #f1f5f9;
      --border: #e2e8f0;
      --text: #0f172a;
      --muted: #64748b;
      --primary: #4f46e5;
      --secondary: #7c3aed;
      --accent: #06b6d4;
      --danger: #ef4444;
      --success: #10b981;
      --radius-xl: 20px;
      --radius-lg: 14px;
      --radius-md: 10px;
      --shadow-soft: 0 10px 30px rgba(2, 6, 23, 0.06);
      --shadow-hover: 0 14px 40px rgba(2, 6, 23, 0.10);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      background: radial-gradient(1200px 600px at 20% -10%, #eef2ff, transparent),
                  radial-gradient(900px 500px at 120% 10%, #ecfeff, transparent),
                  var(--bg);
      color: var(--text);
      height: 100vh;
      display: grid;
      place-items: center;
    }

    .app {
      width: 460px;
      background: var(--card);
      border-radius: var(--radius-xl);
      border: 1px solid var(--border);
      box-shadow: var(--shadow-soft);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 18px;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(180deg, #ffffff, #fbfdff);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 600;
      letter-spacing: 0.2px;
    }

    .logo {
      width: 34px;
      height: 34px;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      display: grid;
      place-items: center;
      color: white;
      font-weight: 700;
      box-shadow: 0 6px 14px rgba(79,70,229,0.25);
    }

    .badge {
      font-size: 11px;
      padding: 6px 10px;
      border-radius: 999px;
      background: #eef2ff;
      color: #4f46e5;
      border: 1px solid #e0e7ff;
    }

    .content {
      padding: 16px 16px 12px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .inputs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .label {
      font-size: 11px;
      color: var(--muted);
    }

    input {
      width: 100%;
      padding: 10px 12px;
      border-radius: var(--radius-md);
      border: 1px solid var(--border);
      background: #ffffff;
      outline: none;
      font-size: 13px;
      transition: all 0.18s ease;
    }

    input::placeholder { color: #94a3b8; }

    input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(79,70,229,0.12);
    }

    .toolbar {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .btn {
      border: 1px solid var(--border);
      background: #fff;
      border-radius: var(--radius-md);
      padding: 10px 12px;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.18s ease;
    }

    .btn.primary {
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: white;
      border: none;
      box-shadow: 0 8px 18px rgba(79,70,229,0.25);
    }

    .btn.primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 12px 24px rgba(79,70,229,0.30);
    }

    .search {
      flex: 1;
      position: relative;
    }

    .search input {
      padding-left: 34px;
      background: var(--surface);
    }

    .search-icon {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 12px;
      color: var(--muted);
    }

    .list {
      margin-top: 6px;
      max-height: 260px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding-right: 4px;
    }

    .item {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      padding: 12px;
      border-radius: var(--radius-lg);
      background: #ffffff;
      border: 1px solid var(--border);
      box-shadow: var(--shadow-soft);
      transition: all 0.18s ease;
    }

    .item:hover {
      transform: translateY(-1px);
      box-shadow: var(--shadow-hover);
      border-color: #dbeafe;
    }

    .meta {
      display: flex;
      flex-direction: column;
      gap: 4px;
      max-width: 300px;
    }

    .key {
      font-weight: 600;
      font-size: 13px;
      color: #4338ca;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .chip {
      font-size: 10px;
      padding: 3px 6px;
      border-radius: 999px;
      background: #ecfeff;
      color: #0891b2;
      border: 1px solid #cffafe;
    }

    .value {
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .actions {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .icon-btn {
      border: 1px solid var(--border);
      background: #fff;
      padding: 6px 8px;
      border-radius: 8px;
      font-size: 11px;
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .icon-btn:hover { background: #f8fafc; }

    .icon-btn.danger {
      color: var(--danger);
      border-color: #fecaca;
      background: #fff1f2;
    }

    .icon-btn.danger:hover { background: #ffe4e6; }

    .footer {
      padding: 10px 16px;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 11px;
      color: var(--muted);
      background: #fbfdff;
    }

    .kbd {
      border: 1px solid var(--border);
      background: white;
      padding: 2px 6px;
      border-radius: 6px;
      font-size: 10px;
      box-shadow: 0 1px 2px rgba(0,0,0,0.05);
    }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-thumb { background: #cbd5f5; border-radius: 10px; }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <div class="brand">
        <div class="logo">T</div>
        <div>Text Expander Pro</div>
      </div>
      <div class="badge">TAB to expand</div>
    </div>

    <div class="content">
      <div class="inputs">
        <div class="field">
          <div class="label">Shortcut</div>
          <input id="keyInput" placeholder="arian" />
        </div>
        <div class="field">
          <div class="label">Expanded Text</div>
          <input id="valueInput" placeholder="Hi, I am Arian..." />
        </div>
      </div>

      <div class="toolbar">
        <button class="btn primary" onclick="addPair()">+ Add</button>
        <div class="search">
          <span class="search-icon">🔍</span>
          <input id="search" placeholder="Search snippets..." oninput="render()" />
        </div>
      </div>

      <div id="list" class="list"></div>
    </div>

    <div class="footer">
      <div>Tip: type shortcut + <span class="kbd">Tab</span></div>
      <div id="count">0 snippets</div>
    </div>
  </div>

  <script>
    let store = JSON.parse(localStorage.getItem('kvStore')) || {};

    function save() {
      localStorage.setItem('kvStore', JSON.stringify(store));
    }

    function render() {
      const list = document.getElementById('list');
      const search = document.getElementById('search').value.toLowerCase();
      const count = document.getElementById('count');

      list.innerHTML = '';
      let visible = 0;

      for (let key in store) {
        if (!key.toLowerCase().includes(search) && !store[key].toLowerCase().includes(search)) continue;
        visible++;

        const div = document.createElement('div');
        div.className = 'item';

        div.innerHTML = `
          <div class="meta">
            <div class="key">${key} <span class="chip">snippet</span></div>
            <div class="value">${store[key]}</div>
          </div>
          <div class="actions">
            <button class="icon-btn" onclick="copyValue('${key}')">Copy</button>
            <button class="icon-btn danger" onclick="removeKey('${key}')">Delete</button>
          </div>
        `;

        list.appendChild(div);
      }

      count.textContent = visible + ' snippets';
    }

    function addPair() {
      const key = document.getElementById('keyInput').value.trim();
      const value = document.getElementById('valueInput').value.trim();

      if (!key || !value) return;

      store[key] = value;
      save();
      render();

      document.getElementById('keyInput').value = '';
      document.getElementById('valueInput').value = '';
    }

    function removeKey(key) {
      delete store[key];
      save();
      render();
    }

    function copyValue(key) {
      navigator.clipboard.writeText(store[key]);
    }

    render();

    document.addEventListener('keydown', function(e) {
      if (e.key === 'Tab') {
        const active = document.activeElement;

        if (active.tagName === 'INPUT' || active.tagName === 'TEXTAREA') {
          const words = active.value.split(' ');
          const lastWord = words[words.length - 1];

          if (store[lastWord]) {
            e.preventDefault();
            words[words.length - 1] = store[lastWord];
            active.value = words.join(' ');
          }
        }
      }
    });
  </script>
</body>
</html>
